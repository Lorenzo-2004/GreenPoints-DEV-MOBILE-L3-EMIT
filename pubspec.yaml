name: greenpoints
description: Programme de récompenses pour gestes écologiques quotidiens
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  flutter_bloc: ^9.0.0
  get_it: ^8.0.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  cloud_functions: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  shared_preferences: ^2.3.0
  dio: ^5.7.0
  connectivity_plus: ^6.1.0
  #flutter_local_notifications: ^18.0.0#
  share_plus: ^10.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0  
  camera: ^0.10.5         
  image_picker: ^1.0.0    

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.4
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/logo/logo.png
    - assets/icons/